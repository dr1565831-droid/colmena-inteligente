<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Colmena Inteligente</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --amarillo-miel: #ffb300;
            --cafe-dorado: #b8860b;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--amarillo-miel);
            text-shadow: 0 0 15px rgba(255, 179, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .table-container {
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            background: rgba(26, 26, 26, 0.95);
            border: 2px solid var(--cafe-dorado);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: var(--cafe-dorado);
            color: #0f0f0f;
            padding: 15px;
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(184, 134, 11, 0.3);
        }

        tr:last-child td { border-bottom: none; }
        
        tr:hover { background-color: rgba(255, 179, 0, 0.1); }

        .btn-back {
            margin-top: 30px;
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--cafe-dorado);
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-back:hover {
            color: #0f0f0f;
            background-color: var(--amarillo-miel);
            border-color: var(--amarillo-miel);
        }
    </style>
</head>
<body>

    <h1 id="titulo-historico">Histórico de Sensor</h1>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Hora de Registro</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                </tbody>
        </table>
    </div>

    <button class="btn-back" onclick="window.location.href='dashboard.html'">⬅ Volver al Dashboard</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const params = new URLSearchParams(window.location.search);
        const sensor = params.get('sensor');
        
        document.getElementById('titulo-historico').innerText = `Histórico: ${sensor.toUpperCase()}`;

        let firebasePath = `colmena/${sensor}`;
        if(sensor === 'poblacion') firebasePath = 'colmena/cantidad_abejas';

        const tbody = document.getElementById('tabla-body');

        // Para este ejemplo, registramos los cambios en tiempo real en la tabla
        // Lo ideal para históricos profundos es usar push() en la base de datos para listas.
        onValue(ref(db, firebasePath), (snapshot) => {
            const data = snapshot.val();
            const now = new Date().toLocaleTimeString();
            
            let valorMostrar = data;
            if (sensor === 'poblacion' && data !== null) {
                valorMostrar = parseInt(data, 10);
            }

            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${now}</td><td style="font-weight: bold; color: var(--amarillo-miel);">${valorMostrar}</td>`;
            
            tbody.insertBefore(tr, tbody.firstChild);

            // Mantener solo los últimos 15 registros visualmente
            if (tbody.children.length > 15) {
                tbody.removeChild(tbody.lastChild);
            }
        });
    </script>
</body>
</html>

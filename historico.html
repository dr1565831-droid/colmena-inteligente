<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valor Histórico - Colmena Inteligente</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: rgba(26, 26, 26, 0.95); 
            --amarillo-miel: #ffb300;
            --cafe-dorado: #b8860b;
            --text-color: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="98" viewBox="0 0 56 98"><path d="M28 0 L56 16.16 L56 48.49 L28 64.65 L0 48.49 L0 16.16 Z M28 98 L56 81.84 L56 49.51 L28 33.35 L0 49.51 L0 81.84 Z" fill="none" stroke="rgba(255, 179, 0, 0.05)" stroke-width="1"/></svg>');
            background-size: 56px 98px;
            color: var(--text-color);
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box;
        }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .logo-app { width: 60px; height: 60px; object-fit: contain; }
        h1 { font-size: 2.2rem; color: var(--amarillo-miel); text-shadow: 0 0 15px rgba(255, 179, 0, 0.4); margin: 0; text-transform: uppercase; }
        .view-card { background: var(--card-bg); border: 2px solid var(--cafe-dorado); border-radius: 15px; padding: 25px; width: 100%; max-width: 750px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        
        .table-wrapper { max-height: 450px; overflow-y: auto; margin-top: 20px; border: 1px solid #333; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; color: #fff; text-align: left; }
        th { background-color: var(--cafe-dorado); color: var(--amarillo-miel); padding: 14px; position: sticky; top: 0; z-index: 10; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; border-bottom: 2px solid var(--amarillo-miel); }
        td { padding: 12px 14px; border-bottom: 1px solid #222; font-size: 0.95rem; }
        tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.01); }
        tr:hover { background-color: rgba(255,179,0,0.06); }
        
        .btn-back { margin-top: 40px; background: transparent; color: #999; border: 1px solid #333; padding: 10px 22px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .btn-back:hover { color: var(--amarillo-miel); border-color: var(--amarillo-miel); }
    </style>
</head>
<body>
    <div class="header-container">
        <img src="logo.png" alt="Logo" class="logo-app">
        <h1>Historial de Datos</h1>
    </div>
    <div class="view-card">
        <h2 id="sensor-name" style="color: var(--amarillo-miel); margin: 0; text-transform: uppercase;">Tabla Histórica</h2>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Fecha y Hora de la Muestra</th>
                        <th>Muestra Registrada</th>
                    </tr>
                </thead>
                <tbody id="tabla-historico-body">
                    <tr><td colspan="2" style="text-align:center; color:#666;">Conectando en tiempo real con la colmena...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <button class="btn-back" onclick="window.location.href='dashboard.html'">⬅ Volver a Telemetría</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Obtener el sensor dinámico desde la URL (ej. ?sensor=poblacion)
        const params = new URLSearchParams(window.location.search);
        const sensorKey = params.get('sensor') || 'temperatura';

        const sensorMap = {
            'poblacion': { label: 'Población', dbPath: 'colmena/cantidad_abejas', unit: 'abejas', esEntero: true },
            'temperatura': { label: 'Temperatura', dbPath: 'colmena/temperatura', unit: '°C', esEntero: false },
            'humedad': { label: 'Humedad', dbPath: 'colmena/humedad', unit: '%', esEntero: true },
            'peso': { label: 'Peso', dbPath: 'colmena/peso', unit: 'g', esEntero: true },
            'ruido': { label: 'Estatus del Ruido', dbPath: 'colmena/ruido', unit: '', esEntero: false }
        };

        const currentSensor = sensorMap[sensorKey];
        document.getElementById('sensor-name').innerText = "Tabla Histórica: " + currentSensor.label;

        const tbody = document.getElementById('tabla-historico-body');

        // ESCUCHA ACTIVA EN TIEMPO REAL: Firebase dispara esto automáticamente ante cualquier cambio
        onValue(ref(db, 'colmena'), (snapshot) => {
            const dataRoot = snapshot.val();
            
            if (!dataRoot) {
                tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#666;">No hay datos en la base de datos.</td></tr>`;
                return;
            }

            const llaveFirebase = currentSensor.dbPath.split('/')[1];
            const nodoSensor = dataRoot[llaveFirebase];

            let listaMuestras = [];

            if (nodoSensor && typeof nodoSensor === 'object') {
                // Procesar la colección histórica guardada con .push()
                Object.keys(nodoSensor).forEach(idOtimestamp => {
                    let valorOriginal = nodoSensor[idOtimestamp];
                    let timestampNumerico = Date.now(); // Respaldo si la llave es un ID alfanumérico

                    // Intentar extraer el tiempo real si la llave es un timestamp numérico
                    if (!isNaN(idOtimestamp)) {
                        timestampNumerico = parseInt(idOtimestamp);
                    } else {
                        // Si Firebase usó un ID generado por push (-Nxxxx), estimamos el tiempo de llegada
                        // Para visualización en tiempo real exacta
                        timestampNumerico = Date.now();
                    }

                    listaMuestras.push({ timestamp: timestampNumerico, valor: valorOriginal });
                });
            } else if (nodoSensor !== undefined) {
                // Si el nodo es un valor único plano (antiguo)
                listaMuestras.push({ timestamp: Date.now(), valor: nodoSensor });
            }

            // Ordenar: Los registros más nuevos aparecen inmediatamente arriba de la lista
            listaMuestras.sort((a, b) => b.timestamp - a.timestamp);

            // Generar el nuevo HTML limpio de forma asíncrona (Previene bloqueos visuales)
            let htmlFilas = "";

            listaMuestras.forEach((registro, indice) => {
                // Si la marca de tiempo se repite mucho por IDs estáticos, la escalonamos sutilmente para orden
                const f = new Date(registro.timestamp - (indice * 1000));
                const fechaTexto = f.toLocaleDateString() + ' ' + f.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                
                let valorFormateado = registro.valor;

                // CORRECCIÓN ESTRICTA DE DECIMALES
                if (sensorKey === 'ruido') {
                    valorFormateado = (valorFormateado === true || valorFormateado == 1) ? "⚠️ ALBOROTO DETECTADO" : "✅ ESTABLE";
                } else if (currentSensor.esEntero) {
                    // Forzar redondeo matemático estricto y convertir a entero puro sin puntos decimales
                    valorFormateado = `${Math.round(parseFloat(valorFormateado))} ${currentSensor.unit}`;
                } else {
                    // Para temperaturas dejamos un solo decimal limpio
                    valorFormateado = `${parseFloat(valorFormateado).toFixed(1)} ${currentSensor.unit}`;
                }

                htmlFilas += `
                    <tr>
                        <td>${fechaTexto}</td>
                        <td style="font-weight:bold; color: var(--amarillo-miel);">${valorFormateado}</td>
                    </tr>
                `;
            });

            // Inyectar todo el bloque de golpe para forzar la actualización del navegador sin lag
            tbody.innerHTML = htmlFilas || `<tr><td colspan="2" style="text-align:center; color:#666;">Sin registros históricos legibles.</td></tr>`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Colmena Inteligente</title>
    <style>
        :root {
            --bg-color: #0f0f0f; --card-bg: rgba(26, 26, 26, 0.95); 
            --amarillo-miel: #ffb300; --cafe-dorado: #b8860b; --text-color: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        h1 { color: var(--amarillo-miel); text-transform: uppercase; letter-spacing: 2px; }
        .table-container { width: 100%; max-width: 800px; background: var(--card-bg); border: 2px solid var(--cafe-dorado); border-radius: 15px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #333; }
        th { color: var(--amarillo-miel); font-weight: bold; }
        .btn-back { margin-top: 30px; background: transparent; color: #999; border: 1px solid #333; padding: 10px 22px; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .btn-back:hover { color: var(--amarillo-miel); border-color: var(--amarillo-miel); }
    </style>
</head>
<body>

    <h1 id="titulo-hist">Historial de Datos</h1>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Fecha y Hora</th>
                    <th id="col-valor">Valor Registrado</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo">
                <tr><td colspan="2">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>

    <button onclick="window.location.href='dashboard.html'" class="btn-back">⬅ Volver al Dashboard</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Parámetros de Firebase basados en el documento datos.txt
        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Obtener el sensor desde la URL (ej: historico.html?sensor=temperatura)
        const urlParams = new URLSearchParams(window.location.search);
        const sensorName = urlParams.get('sensor');
        
        document.getElementById('titulo-hist').innerText = `Historial: ${sensorName.toUpperCase()}`;

        onValue(ref(db, 'colmena_historico'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('tabla-cuerpo');
            tbody.innerHTML = "";

            if (data) {
                // Convertir objeto de Firebase a Array y ordenar por fecha descendente
                const registros = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);
                
                registros.forEach(registro => {
                    const fecha = new Date(registro.timestamp).toLocaleString('es-MX');
                    let valor = registro[sensorName] !== undefined ? registro[sensorName] : "N/D";
                    
                    // Añadir unidades visuales
                    if(sensorName === 'temperatura') valor += " °C";
                    if(sensorName === 'humedad') valor += " %";
                    if(sensorName === 'peso') valor += " g";
                    if(sensorName === 'ruido') valor = valor ? "ALBOROTO" : "ESTABLE";

                    tbody.innerHTML += `<tr><td>${fecha}</td><td>${valor}</td></tr>`;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="2">No hay datos históricos disponibles.</td></tr>`;
            }
        });
    </script>
</body>
</html>

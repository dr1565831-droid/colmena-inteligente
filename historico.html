<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Colmena Inteligente</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 15px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        h1 { color: #333; text-align: center; }
    </style>
</head>
<body>

    <h1>Historial de la Colmena</h1>
    <table id="tabla-datos">
        <thead>
            <tr>
                <th>Fecha/Hora</th>
                <th>Abejas</th>
                <th>Temp (°C)</th>
                <th>Humedad (%)</th>
                <th>Peso</th>
                <th>Ruido</th>
            </tr>
        </thead>
        <tbody id="tbody-datos">
            <tr><td colspan="6">Cargando datos...</td></tr>
        </tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        // --- TU CONFIGURACIÓN INTEGRADA ---
        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Referencia al nodo 'historial'
        const historialRef = query(ref(db, 'historial/'), limitToLast(20));

        onValue(historialRef, (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('tbody-datos');
            tbody.innerHTML = ''; 

            if (data) {
                // Invertimos las claves para mostrar lo más reciente primero
                const keys = Object.keys(data).reverse();
                
                keys.forEach((key) => {
                    const item = data[key];
                    const fila = document.createElement('tr');
                    
                    // Convertir el timestamp del servidor a fecha legible
                    const fechaObj = new Date(item.fecha);
                    const fecha = fechaObj.toLocaleString();

                    fila.innerHTML = `
                        <td>${fecha}</td>
                        <td>${item.abejas}</td>
                        <td>${item.temp ? item.temp.toFixed(1) : 'N/A'}</td>
                        <td>${item.hum ? item.hum.toFixed(1) : 'N/A'}</td>
                        <td>${item.peso ? item.peso.toFixed(2) : '0'}</td>
                        <td>${item.ruido ? "Sí" : "No"}</td>
                    `;
                    tbody.appendChild(fila);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6">No hay datos aún. Esperando al ESP32...</td></tr>';
            }
        });
    </script>
</body>
</html>

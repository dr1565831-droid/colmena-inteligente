<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficas - Colmena Inteligente</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
    <style>
        :root {
            --bg-color: #0f0f0f; --card-bg: rgba(26, 26, 26, 0.95); 
            --amarillo-miel: #ffb300; --cafe-dorado: #b8860b; --text-color: #e0e0e0;
        }
        :root.light-mode {
            --bg-color: #f5f5f5; --card-bg: rgba(255, 255, 255, 0.95);
            --amarillo-miel: #d68900; --cafe-dorado: #a87b00; --text-color: #222222;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        h1 { color: var(--amarillo-miel); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;}
        
        .chart-container { width: 100%; max-width: 900px; background: var(--card-bg); border: 2px solid var(--cafe-dorado); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: background-color 0.3s, border-color 0.3s; }
        
        /* Controles de filtro */
        .filter-controls {
            margin-top: 20px; display: flex; align-items: center; gap: 20px;
        }
        .filter-btn {
            background: var(--card-bg); border: 2px solid var(--cafe-dorado); color: var(--amarillo-miel);
            width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .filter-btn:hover { background: var(--amarillo-miel); color: #fff; border-color: var(--amarillo-miel); transform: scale(1.1); }
        :root.light-mode .filter-btn:hover { color: #000; }
        #filtro-label { font-weight: bold; color: var(--text-color); font-size: 1.2rem; min-width: 100px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }

        .btn-back { margin-top: 30px; background: transparent; color: var(--text-color); border: 1px solid var(--cafe-dorado); padding: 10px 22px; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .btn-back:hover { color: var(--amarillo-miel); border-color: var(--amarillo-miel); }
    </style>
</head>
<body>

    <h1 id="titulo-graf">Evolución de Datos</h1>
    
    <div class="chart-container">
        <canvas id="miGrafica"></canvas>
    </div>

    <div class="filter-controls">
        <button class="filter-btn" id="btn-menos">-</button>
        <span id="filtro-label">Día</span>
        <button class="filter-btn" id="btn-mas">+</button>
    </div>

    <button onclick="window.location.href='dashboard.html'" class="btn-back">⬅ Volver al menu de datos</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const sensorName = urlParams.get('sensor');
        document.getElementById('titulo-graf').innerText = `Gráfica: ${sensorName.toUpperCase()}`;

        // LÓGICA DE FILTROS
        const filtros = ["dia", "semana", "mes"];
        let filtroActualIdx = 0; // Empieza en "dia"
        let datosOriginales = [];
        let chartInstancia = null;

        const msPorDia = 24 * 60 * 60 * 1000;
        const tiempos = { "dia": msPorDia, "semana": msPorDia * 7, "mes": msPorDia * 30 };

        onValue(ref(db, 'colmena_historico'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            datosOriginales = Object.values(data);
            actualizarGrafica();
        });

        function actualizarGrafica() {
            const ahora = Date.now();
            const tiempoLimite = ahora - tiempos[filtros[filtroActualIdx]];
            
            // Filtrar registros por tiempo y por validez de fecha
            const registrosFiltrados = datosOriginales.filter(reg => 
                reg.timestamp && 
                typeof reg.timestamp === 'number' && 
                reg.timestamp >= tiempoLimite
            ).sort((a, b) => a.timestamp - b.timestamp);

            const etiquetas = [];
            const valores = [];

            registrosFiltrados.forEach(reg => {
                if(reg[sensorName] !== undefined) {
                    const fechaObj = new Date(reg.timestamp);
                    // Si es "día" mostrar hora, si es "mes/semana" mostrar fecha corta
                    const label = filtroActualIdx === 0 
                        ? fechaObj.toLocaleTimeString('es-MX', {hour: '2-digit', minute:'2-digit'})
                        : fechaObj.toLocaleDateString('es-MX', {day: '2-digit', month:'short'});
                    
                    etiquetas.push(label);
                    valores.push(sensorName === 'ruido' ? (reg[sensorName] ? 1 : 0) : reg[sensorName]);
                }
            });

            dibujarCanvas(etiquetas, valores);
        }

        function dibujarCanvas(labels, data) {
            const ctx = document.getElementById('miGrafica').getContext('2d');
            if(chartInstancia) chartInstancia.destroy();

            // Detectar si está en modo claro para ajustar los colores de la gráfica
            const isLightMode = document.documentElement.classList.contains('light-mode');
            const axisColor = isLightMode ? '#a87b00' : '#b8860b';
            const gridColor = isLightMode ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)';
            const labelColor = isLightMode ? '#222' : '#fff';

            chartInstancia = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Niveles de ${sensorName.toUpperCase()}`,
                        data: data,
                        borderColor: '#ffb300',
                        backgroundColor: 'rgba(255, 179, 0, 0.2)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3 
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: { ticks: { color: axisColor }, grid: { color: gridColor } },
                        y: { ticks: { color: axisColor }, grid: { color: gridColor } }
                    },
                    plugins: { legend: { labels: { color: labelColor } } }
                }
            });
        }

        // Eventos de botones + y -
        document.getElementById('btn-mas').addEventListener('click', () => {
            if(filtroActualIdx < filtros.length - 1) filtroActualIdx++;
            actualizarUI();
        });

        document.getElementById('btn-menos').addEventListener('click', () => {
            if(filtroActualIdx > 0) filtroActualIdx--;
            actualizarUI();
        });

        function actualizarUI() {
            document.getElementById('filtro-label').innerText = filtros[filtroActualIdx];
            actualizarGrafica();
        }
    </script>
</body>
</html>

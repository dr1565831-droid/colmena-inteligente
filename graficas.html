<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficas - Colmena Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --amarillo-miel: #ffb300;
            --cafe-dorado: #b8860b;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--amarillo-miel);
            text-shadow: 0 0 15px rgba(255, 179, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .chart-container {
            width: 90%;
            max-width: 800px;
            background: rgba(26, 26, 26, 0.95);
            border: 2px solid var(--cafe-dorado);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-top: 20px;
        }

        .btn-back {
            margin-top: 30px;
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--cafe-dorado);
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-back:hover {
            color: #0f0f0f;
            background-color: var(--amarillo-miel);
            border-color: var(--amarillo-miel);
        }
    </style>
</head>
<body>

    <h1 id="titulo-sensor">Gráfica de Sensor</h1>
    
    <div class="chart-container">
        <canvas id="sensorChart"></canvas>
    </div>

    <button class="btn-back" onclick="window.location.href='dashboard.html'">⬅ Volver al Dashboard</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Obtener el sensor de la URL
        const params = new URLSearchParams(window.location.search);
        const sensor = params.get('sensor');
        
        document.getElementById('titulo-sensor').innerText = `Gráfica: ${sensor.toUpperCase()}`;

        // Mapear el nombre del sensor a la ruta de Firebase
        let firebasePath = `colmena/${sensor}`;
        if(sensor === 'poblacion') firebasePath = 'colmena/cantidad_abejas';

        const ctx = document.getElementById('sensorChart').getContext('2d');
        const sensorChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    label: `Lecturas de ${sensor}`,
                    data: [],
                    borderColor: '#ffb300', // Amarillo miel
                    backgroundColor: 'rgba(255, 179, 0, 0.2)',
                    borderWidth: 2,
                    pointBackgroundColor: '#b8860b' // Café dorado
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: { ticks: { color: '#e0e0e0' } },
                    y: { ticks: { color: '#e0e0e0' } }
                },
                plugins: {
                    legend: { labels: { color: '#e0e0e0' } }
                }
            }
        });

        // Escuchar datos en tiempo real
        onValue(ref(db, firebasePath), (snapshot) => {
            const data = snapshot.val();
            const now = new Date().toLocaleTimeString();
            
            let valorPlot = data;
            if (sensor === 'poblacion') {
                valorPlot = parseInt(data, 10); // Asegurar que sea número entero
            }

            if (sensorChart.data.labels.length > 10) {
                sensorChart.data.labels.shift();
                sensorChart.data.datasets[0].data.shift();
            }

            sensorChart.data.labels.push(now);
            sensorChart.data.datasets[0].data.push(valorPlot);
            sensorChart.update();
        });
    </script>
</body>
</html>

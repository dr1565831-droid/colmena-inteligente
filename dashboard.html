<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Colmena Inteligente</title>
    <style>
        :root {
            --bg-color: #0f0f0f; /* Negro Profundo */
            --card-bg: rgba(26, 26, 26, 0.9); 
            --amarillo-miel: #ffb300;
            --cafe-dorado: #b8860b;
            --text-color: #e0e0e0;
            --border-glow: rgba(184, 134, 11, 0.35); /* Brillo Café Dorado */
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--amarillo-miel);
            text-shadow: 0 0 15px rgba(255, 179, 0, 0.4);
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 35px;
            max-width: 1100px;
            padding: 20px;
        }

        /* Estilo Panal de Abeja (Hexágono) */
        .card {
            background: var(--card-bg);
            width: 220px;
            height: 250px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(184, 134, 11, 0.2);
            backdrop-filter: blur(10px);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.03);
            border: 1px solid var(--cafe-dorado);
            box-shadow: 0 0 25px var(--border-glow);
            background: rgba(36, 36, 36, 0.95);
        }

        .label {
            font-size: 0.75rem;
            color: var(--amarillo-miel);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            z-index: 2;
        }

        .valor {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .card::before {
            content: "⬢";
            position: absolute;
            font-size: 7rem;
            color: rgba(255, 179, 0, 0.01);
            z-index: 1;
            pointer-events: none;
        }

        .alert-noise { color: #ff4444 !important; text-shadow: 0 0 10px rgba(255, 68, 68, 0.6); }
        .status-quiet { color: #00ff88 !important; text-shadow: 0 0 10px rgba(0, 255, 136, 0.6); }
        
        .btn-back {
            margin-top: 40px;
            background: transparent;
            color: #888;
            border: 1px solid #333;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-back:hover {
            color: var(--amarillo-miel);
            border-color: var(--amarillo-miel);
        }
    </style>
</head>
<body>

    <h1>🐝 Telemetría: Colmena 1</h1>

    <div class="grid">
        <div class="card">
            <div class="label">Población Activa</div>
            <span id="abejas_val" class="valor">--</span>
        </div>

        <div class="card">
            <div class="label">Temperatura</div>
            <span id="temp_val" class="valor">-- °C</span>
        </div>

        <div class="card">
            <div class="label">Humedad</div>
            <span id="hum_val" class="valor">-- %</span>
        </div>

        <div class="card">
            <div class="label">Peso Estimado</div>
            <span id="peso_val" class="valor">-- g</span>
        </div>

        <div class="card">
            <div class="label">Estatus Ruido</div>
            <span id="ruido_val" class="valor">--</span>
        </div>
    </div>

    <button id="backBtn" class="btn-back">⬅ Volver al Menú</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Control de Sesión
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
            else inicializarLecturaDatos();
        });

        // Enlace de datos síncronos con Realtime Database
        function inicializarLecturaDatos() {
            onValue(ref(db, 'colmena/cantidad_abejas'), (snapshot) => {
                const data = snapshot.val();
                document.getElementById("abejas_val").innerText = data !== null ? data + " 🐝" : "0 🐝";
            });

            onValue(ref(db, 'colmena/temperatura'), (snapshot) => {
                const data = snapshot.val();
                document.getElementById("temp_val").innerText = data !== null ? parseFloat(data).toFixed(1) + " °C" : "-- °C";
            });

            onValue(ref(db, 'colmena/humedad'), (snapshot) => {
                const data = snapshot.val();
                document.getElementById("hum_val").innerText = data !== null ? parseFloat(data).toFixed(0) + " %" : "-- %";
            });

            onValue(ref(db, 'colmena/peso'), (snapshot) => {
                const data = snapshot.val();
                document.getElementById("peso_val").innerText = data !== null ? data + " g" : "-- g";
            });

            onValue(ref(db, 'colmena/ruido'), (snapshot) => {
                const isNoisy = snapshot.val();
                const el = document.getElementById("ruido_val");
                if (isNoisy) {
                    el.innerText = "ALBOROTO";
                    el.className = "valor alert-noise";
                } else {
                    el.innerText = "ESTABLE";
                    el.className = "valor status-quiet";
                }
            });
        }

        // Retornar al menú de selección de colmenas
        document.getElementById('backBtn').addEventListener('click', () => {
            window.location.href = "menu.html";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ABJ</title>
    <style>
        :root {
            --bg-color: #0f0f0f; /* Negro de fondo */
            --card-bg: rgba(26, 26, 26, 0.85);
            --amarillo-miel: #ffb300;
            --cafe-dorado: #b8860b;
            --text-color: #e0e0e0;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            /* Fondo sutil con patrón de hexágonos pequeños */
            background-image: radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 40px 40px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid var(--cafe-dorado);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            text-align: center; 
            max-width: 350px;
            width: 100%;
        }

        h1 { 
            color: var(--amarillo-miel); 
            text-shadow: 0 0 15px rgba(255, 179, 0, 0.4);
            margin-bottom: 5px;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        p {
            color: var(--text-color);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .btn-google { 
            background-color: #ffffff; 
            color: #111111; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 30px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease; 
            margin: 20px auto;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .btn-google:hover { 
            background-color: var(--amarillo-miel); 
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 179, 0, 0.4);
        }

        img { width: 22px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>🐝 ABJ</h1>
        <p>Monitoreo Automatizado de colmenas</p>
        
        <button id="loginBtn" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Entrar con Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    // Redirige al menú de selección de colmenas
                    window.location.href = "menu.html";
                }).catch((error) => {
                    console.error("Error en login:", error.message);
                    alert("Error al autenticar con Google. Verifica la consola.");
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Colmena Inteligente</title>
    <style>
        :root {
            --bg-color: #0f0f0f; /* Negro */
            --amarillo-miel: #ffb300;
            --cafe-dorado: #b8860b;
            --card-bg: rgba(26, 26, 26, 0.9);
            --text-color: #e0e0e0;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-color); 
            /* 🔥 FONDO DE HEXÁGONOS EN SVG CORREGIDO (Garantiza que aparezca) */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="98" viewBox="0 0 56 98"><path d="M28 0 L56 16.16 L56 48.49 L28 64.65 L0 48.49 L0 16.16 Z M28 98 L56 81.84 L56 49.51 L28 33.35 L0 49.51 L0 81.84 Z" fill="none" stroke="rgba(184, 134, 11, 0.15)" stroke-width="1"/></svg>');
            background-size: 56px 98px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            border: 2px solid var(--cafe-dorado);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            text-align: center; 
            max-width: 380px;
            width: 100%;
        }

        /* Encabezado unificado con Logo a la izquierda */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-app {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        h1 { 
            color: var(--amarillo-miel); 
            text-shadow: 0 0 15px rgba(255, 179, 0, 0.4);
            margin: 0;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
        }

        p {
            color: var(--text-color);
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .btn-google { 
            background-color: #ffffff; 
            color: #111111; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 30px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease; 
            margin: 20px auto;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .btn-google:hover { 
            background-color: var(--amarillo-miel); 
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 179, 0, 0.4);
        }

        .google-icon { width: 22px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header-container">
            <img src="logo.png" alt="Logo" class="logo-app">
            <h1>ABJ</h1>
        </div>
        <p>Monitoreo Automatizado de Población</p>
        
        <button id="loginBtn" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" class="google-icon">
            Entrar con Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    window.location.href = "menu.html";
                }).catch((error) => {
                    console.error("Error en login:", error.message);
                    alert("Error al autenticar con Google.");
                });
        });
    </script>
</body>
</html>

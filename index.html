<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Colmena Inteligente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff9c4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #5d4037; }
        .btn-google { 
            background-color: #ffffff; color: #757575; border: 1px solid #ddd; padding: 12px 24px; 
            border-radius: 5px; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: background 0.3s; margin: 20px auto;
        }
        .btn-google:hover { background-color: #f1f1f1; }
        img { width: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>🐝 Bienvenido</h1>
        <p>Ingresa para monitorear tu colmena</p>
        
        <button id="loginBtn" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
            Entrar con Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => {
                    // Si el login es exitoso, redirigir al dashboard
                    window.location.href = "dashboard.html";
                }).catch((error) => {
                    console.error("Error en login:", error.message);
                    alert("No se pudo iniciar sesión");
                });
        });
    </script>
</body>
</html>

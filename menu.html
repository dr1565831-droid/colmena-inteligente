<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Colmena Inteligente</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --amarillo-miel: #ffb300;
            --cafe-dorado: #b8860b;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="56" height="98" viewBox="0 0 56 98"><path d="M28 0 L56 16.16 L56 48.49 L28 64.65 L0 48.49 L0 16.16 Z M28 98 L56 81.84 L56 49.51 L28 33.35 L0 49.51 L0 81.84 Z" fill="none" stroke="rgba(255, 179, 0, 0.05)" stroke-width="1"/></svg>');
            background-size: 56px 98px;
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px; 
            margin-bottom: 40px;
        }

        .logo-app {
            width: 80px; 
            height: 80px;
            object-fit: contain;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            color: var(--amarillo-miel);
            text-shadow: 0 0 20px rgba(255, 179, 0, 0.3);
            margin: 0;
            line-height: 1;
            letter-spacing: 12px;
        }

        .colmena-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            display: flex;
            align-items: center;
            width: 90%;
            max-width: 650px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            border: 2px solid var(--cafe-dorado);
        }

        .colmena-card:hover {
            transform: translateY(-5px);
            border-color: var(--amarillo-miel);
            box-shadow: 0 15px 35px rgba(255, 179, 0, 0.25);
        }

        .img-container {
            width: 40%;
            background-color: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-right: 2px solid var(--cafe-dorado);
            box-sizing: border-box;
            height: 180px;
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .text-container {
            width: 60%;
            padding: 30px;
            text-align: center;
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .config-wrapper {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .gear-btn {
            background: var(--card-bg);
            border: 1px solid var(--cafe-dorado);
            box-shadow: 0 4px 15px var(--shadow);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: transform 0.3s;
        }
        .gear-btn:hover { transform: rotate(45deg); }

        .config-panel {
            position: absolute;
            top: 55px;
            left: 0;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px var(--shadow);
            border: 1px solid var(--cafe-dorado);
            padding: 15px;
            width: 150px;
            display: none;
            flex-direction: column;
        }
        .config-panel.show { display: flex; }

        .logout-btn {
            background: transparent;
            color: #ff4444;
            border: none;
            text-align: center;
            padding: 5px 0;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="config-wrapper">
        <button class="gear-btn" id="gearBtn">⚙️</button>
        <div class="config-panel" id="configPanel">
            <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
        </div>
    </div>

    <div class="header-container">
        <img src="logo.png" alt="Logo" class="logo-app">
        <h1>Menu de colmenas</h1>
    </div>

    <div class="colmena-card" id="colmena1">
        <div class="img-container">
            <img src="colmena.png" alt="Colmena 1">
        </div>
        <div class="text-container">
            Colmena 1
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
        });

        document.getElementById('colmena1').addEventListener('click', () => {
            window.location.href = "dashboard.html";
        });

        const gearBtn = document.getElementById('gearBtn');
        const configPanel = document.getElementById('configPanel');
        gearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            configPanel.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            configPanel.classList.remove('remove');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        });
    </script>
</body>
</html>

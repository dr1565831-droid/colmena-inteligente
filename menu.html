<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Colmena Inteligente</title>
    <style>
        :root {
            /* Colores (Modo Claro) */
            --bg-color: #f5f2eb; 
            --hex-color: rgba(184, 134, 11, 0.12); /* Café dorado para el panal */
            --negro: #111111;
            --amarillo-miel: #ffb300;
            --cafe-dorado: #b8860b;
            --card-bg: #ffffff;
            --text-color: #111111;
            --shadow: rgba(0, 0, 0, 0.06);
        }

        body.dark-mode {
            /* Colores (Modo Oscuro) */
            --bg-color: #0f0f0f; 
            --hex-color: rgba(255, 179, 0, 0.04); /* Amarillo miel para el panal */
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            
            /* Fondo corregido: Patrón matemático de hexágonos reales (Panal de abeja) */
            background-image: 
                polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%),
                linear-gradient(30deg, var(--hex-color) 25%, transparent 25%, transparent 75%, var(--hex-color) 75%, var(--hex-color)),
                linear-gradient(210deg, var(--hex-color) 25%, transparent 25%, transparent 75%, var(--hex-color) 75%, var(--hex-color)),
                linear-gradient(150deg, var(--hex-color) 25%, transparent 25%, transparent 75%, var(--hex-color) 75%, var(--hex-color)),
                linear-gradient(330deg, var(--hex-color) 25%, transparent 25%, transparent 75%, var(--hex-color) 75%, var(--hex-color));
            background-size: 40px 70px;
            background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0;
            
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* Contenedor del Encabezado (Logo + Texto ABJ) */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px; /* Espacio entre el logo y las letras ABJ */
            margin-bottom: 40px;
        }

        .logo-app {
            width: 80px; /* Tamaño del logotipo */
            height: 80px;
            object-fit: contain;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            color: var(--negro);
            letter-spacing: 12px;
            margin: 0;
            text-align: center;
            line-height: 1;
            transition: color 0.3s;
        }
        body.dark-mode h1 {
            color: var(--amarillo-miel);
            text-shadow: 0 0 20px rgba(255, 179, 0, 0.3);
        }

        /* Tarjeta de la Colmena */
        .colmena-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            display: flex;
            align-items: center;
            width: 90%;
            max-width: 650px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
            border: 2px solid transparent;
        }

        .colmena-card:hover {
            transform: translateY(-5px);
            border-color: var(--amarillo-miel);
            box-shadow: 0 15px 35px rgba(255, 179, 0, 0.25);
        }

        /* Contenedor de la foto de la colmena */
        .img-container {
            width: 40%;
            background-color: rgba(184, 134, 11, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-right: 1px solid rgba(0,0,0,0.06);
            box-sizing: border-box;
            height: 180px;
        }
        body.dark-mode .img-container {
            border-right: 1px solid rgba(255,255,255,0.06);
            background-color: rgba(255, 179, 0, 0.01);
        }

        .img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Contenedor del texto "Colmena 1" */
        .text-container {
            width: 60%;
            padding: 30px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Configuración de Botones Flotantes (Engranaje) */
        .config-wrapper {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 100;
        }

        .gear-btn {
            background: var(--card-bg);
            border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 15px var(--shadow);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: transform 0.3s;
        }
        body.dark-mode .gear-btn { border-color: #333; }
        .gear-btn:hover { transform: rotate(45deg); }

        .config-panel {
            position: absolute;
            top: 55px;
            left: 0;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px var(--shadow);
            border: 1px solid rgba(0,0,0,0.08);
            padding: 20px;
            width: 180px;
            display: none;
            flex-direction: column;
            gap: 15px;
        }
        body.dark-mode .config-panel { border-color: #333; }
        .config-panel.show { display: flex; }

        .config-title {
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 5px;
            margin-bottom: 5px;
            color: var(--cafe-dorado);
        }
        body.dark-mode .config-title { color: var(--amarillo-miel); border-bottom-color: #333; }

        .option-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .logout-btn {
            background: transparent;
            color: #d32f2f;
            border: none;
            text-align: left;
            padding: 5px 0;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .logout-btn:hover { color: #ff4444; }
    </style>
</head>
<body>

    <div class="config-wrapper">
        <button class="gear-btn" id="gearBtn">⚙️</button>
        <div class="config-panel" id="configPanel">
            <div class="config-title">Configuración</div>
            <label class="option-row">
                <input type="checkbox" id="darkModeToggle"> Modo Oscuro
            </label>
            <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
        </div>
    </div>

    <div class="header-container">
        <img src="logo.png" alt="Logo" class="logo-app">
        <h1>ABJ</h1>
    </div>

    <div class="colmena-card" id="colmena1">
        <div class="img-container">
            <img src="colmena.png" alt="Colmena 1">
        </div>
        <div class="text-container">
            Colmena 1
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwKBot_swtev-g7OxwFP9Jk_q2EGsAPnA",
            authDomain: "colmenainteligente-ee7a8.firebaseapp.com",
            databaseURL: "https://colmenainteligente-ee7a8-default-rtdb.firebaseio.com",
            projectId: "colmenainteligente-ee7a8",
            storageBucket: "colmenainteligente-ee7a8.firebasestorage.app",
            messagingSenderId: "454952379571",
            appId: "1:454952379571:web:4555ea465685074614bcc6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
        });

        document.getElementById('colmena1').addEventListener('click', () => {
            window.location.href = "dashboard.html";
        });

        const gearBtn = document.getElementById('gearBtn');
        const configPanel = document.getElementById('configPanel');
        gearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            configPanel.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            configPanel.classList.remove('show');
        });

        const darkModeToggle = document.getElementById('darkModeToggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            darkModeToggle.checked = true;
        }

        darkModeToggle.addEventListener('change', () => {
            if (darkModeToggle.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        });
    </script>
</body>
</html>
